<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - BrallGPT</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <a class="logo center" href="../index.html">Brall<span>GPT</span></a>
    <h1>Welcome back</h1>
    <p>Login to continue your AI workspace.</p>

    <form id="loginForm" class="auth-form">
      <label>Email</label>
      <input type="email" id="email" required placeholder="you@example.com" />

      <label>Password</label>
      <input type="password" id="password" required placeholder="Enter password" />

      <button type="submit" class="btn primary full">Login</button>
      <div id="authMessage" class="form-message"></div>
    </form>

    <p class="auth-link">No account? <a href="signup.html">Create one</a></p>
    <p class="auth-link"><a href="forgot-password.html">Forgot password?</a></p>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
