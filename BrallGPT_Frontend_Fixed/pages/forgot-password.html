<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - BrallGPT</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <a class="logo center" href="../index.html">Brall<span>GPT</span></a>
    <h1>Reset password</h1>
    <p>Enter your email to receive password reset instructions.</p>

    <form id="forgotForm" class="auth-form">
      <label>Email</label>
      <input type="email" id="email" required placeholder="you@example.com" />
      <button type="submit" class="btn primary full">Send Reset Link</button>
      <div id="authMessage" class="form-message"></div>
    </form>

    <p class="auth-link"><a href="login.html">Back to login</a></p>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
