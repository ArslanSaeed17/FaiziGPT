<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - BrallGPT</title>
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div>
        <a class="logo dash-logo" href="dashboard.html">Brall<span>GPT</span></a>
        <p class="sidebar-subtitle">AI Student Platform</p>
      </div>

      <nav class="side-nav">
        <a href="dashboard.html" data-nav="dashboard">Dashboard</a>
        <a href="chat.html" data-nav="chat">AI Chat</a>
        <a href="tools.html" data-nav="tools">AI Tools</a>
        <a href="saved-chats.html" data-nav="saved">Saved Chats</a>
        <a href="pricing.html" data-nav="pricing">Pricing</a>
        <a href="profile.html" data-nav="profile">Profile</a>
      </nav>

      <button class="logout-btn" id="logoutBtn">Logout</button>
    </aside>

    <main class="dash-main">
      <header class="dash-topbar">
        <button class="menu-btn" id="menuBtn">☰</button>
        <div>
          <h1>Dashboard</h1>
          <p>Your BrallGPT workspace overview.</p>
        </div>
      </header>

      <section class="stats-grid">
        <div class="stat-card"><h3>Daily Questions</h3><p><span id="usedQuestions">0</span>/20 used</p></div>
        <div class="stat-card"><h3>Plan</h3><p id="planName">Free Plan</p></div>
        <div class="stat-card"><h3>Total Chats</h3><p id="totalChats">0</p></div>
        <div class="stat-card"><h3>Status</h3><p>Active</p></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>AI Tools</h2>
          <a href="tools.html">View all</a>
        </div>
        <div class="tools-grid" id="toolsGrid"></div>
      </section>

    </main>
  </div>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
